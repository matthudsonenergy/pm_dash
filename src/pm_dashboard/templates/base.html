<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}PM Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='style.css') }}">
  </head>
  <body>
    <div class="page-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-kicker">Portfolio</span>
          <h1>PM Control Tower</h1>
          <p>Seven projects, one exception queue.</p>
        </div>
        <nav class="nav">
          <a href="/">Overview</a>
          <a href="/cockpit">Weekly Cockpit</a>
          <a href="/attention">Attention Queue</a>
          <a href="/dependencies">Dependencies</a>
          <a href="/admin/imports">Imports</a>
        </nav>
        <div class="project-nav">
          <p class="section-label">Projects</p>
          {% for nav_project in projects_nav %}
            <a href="/projects/{{ nav_project.id }}">{{ nav_project.name }}</a>
          {% endfor %}
        </div>
      </aside>
      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
